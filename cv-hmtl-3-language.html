    const terminalMeta = {
      de: {
        title: "~/catalin/catalin_cv.txt",
        user: "catalin@pc",
        command: " cat catalin_cv.txt"
      },
      en: {
        title: "~/catalin/catalin_cv_en.txt",
        user: "catalin@pc",
        command: " cat catalin_cv_en.txt"
      },
      ro: {
        title: "~/catalin/catalin_cv_ro.txt",
        user: "catalin@pc",
        command: " cat catalin_cv_ro.txt"
      }
    };

    const el = document.getElementById("typewriter");
    const portfolio = document.getElementById("portfolio");
    const langSelect = document.getElementById("langSelect");
    const terminalTitle = document.getElementById("terminalTitle");
    const promptUser = document.getElementById("promptUser");
    const promptCommand = document.getElementById("promptCommand");

    let currentLang = "de";
    let i = 0;
    let typingTimeout = null;
    let dotsInterval = null;

    function renderPortfolio() {
      portfolio.innerHTML = portfolioTemplates[currentLang];
    }

    function clearTyping() {
      if (typingTimeout) {
        clearTimeout(typingTimeout);
        typingTimeout = null;
      }
      if (dotsInterval) {
        clearInterval(dotsInterval);
        dotsInterval = null;
      }
      el.innerHTML = "";
    }

    function startTyping() {
      clearTyping();
      i = 0;
      const cvText = cvTexts[currentLang];

      function type() {
        if (i < cvText.length) {
          el.textContent += cvText.charAt(i);
          i++;
          typingTimeout = setTimeout(type, 35); // slower typing
        } else {
          const cursor = document.createElement("span");
          cursor.className = "cursor";
          cursor.innerHTML = " ";
          el.appendChild(cursor);

          const loadingDots = document.createElement("div");
          loadingDots.style.color = "#7dffcf";
          loadingDots.style.marginTop = "10px";
          loadingDots.style.fontSize = "14px";
          loadingDots.style.opacity = "0.8";
          loadingDots.innerHTML = "System awaiting input<span id='dots'>.</span>";
          el.appendChild(loadingDots);

          let dotCount = 1;
          dotsInterval = setInterval(() => {
            dotCount = (dotCount % 3) + 1;
            const dotsEl = document.getElementById("dots");
            if (dotsEl) {
              dotsEl.innerHTML = ".".repeat(dotCount);
            }
          }, 500);

          setTimeout(() => {
            portfolio.classList.add("visible");
          }, 1200);
        }
      }

      type();
    }

    function applyTerminalMeta() {
      const meta = terminalMeta[currentLang];
      terminalTitle.textContent = meta.title;
      promptUser.textContent = meta.user;
      promptCommand.textContent = meta.command;
    }

    langSelect.addEventListener("change", () => {
      currentLang = langSelect.value;
      applyTerminalMeta();
      renderPortfolio();
      startTyping();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    // Initial render
    applyTerminalMeta();
    renderPortfolio();
    startTyping();
  </script>
