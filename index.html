<script>

const screen = document.getElementById("screen");

let content = "";

function render(){
    screen.innerHTML =
    content +
    '<span class="cursor"></span>';
}

async function run(){

let city="Unknown";
let country="Unknown";
let ip="Hidden";

try{

    const response = await fetch(
        "https://ipwho.is/"
    );

    const data = await response.json();

    if(data.success){

        city = data.city || "Unknown";
        country = data.country || "Unknown";
        ip = data.ip || "Hidden";

    }

}catch(e){

    console.log("Location lookup failed:",e);

}

const message=`

[ System Status: Loading next section ]
[ Awaiting new data... ]
[ ... ]

System awaiting input...


[ OK ] Access granted...

[ WARNING ]

Suspicious activity detected.

Congratulations.

You've been hacked.*

*^or_$$@$%%@@#$@%.

Scanning visitor profile...

IP: ${ip}

CITY: ${city}

COUNTRY: ${country}

Analyzing behavior...

Searching:
"how to get rich fast"

Searching:
"best pizza near me"

Searching:
"laptop making strange noises"

Interesting observations:

- too many browser tabs
- coffee levels unstable
- update notifications ignored

Deploying AI response...

CRITICAL EVENT DETECTED

`;

await type(message);

await countdown();

content += `

ABORT SIGNAL RECEIVED...

Shutdown cancelled.

Diagnosis:

No hacking detected.

Only curiosity detected 😄

System awaiting input...

`;

render();

}

function type(text){

return new Promise(resolve=>{

let i=0;

function next(){

if(i<text.length){

content += text[i];

render();

i++;

setTimeout(next,25);

}else{

resolve();

}

}

next();

});

}

function countdown(){

return new Promise(resolve=>{

let n=10;

const timer=
setInterval(()=>{

content +=
`\nYOUR SYSTEM WILL SHUT DOWN IN ${n}`;

render();

n--;

if(n<0){

clearInterval(timer);

resolve();

}

},1000);

});

}

run();

</script>
